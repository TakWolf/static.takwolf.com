<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ark Pixel Font 12 - Preview</title>
    <style>
        @font-face {
            font-family: Ark-Pixel;
            src: url("ark-pixel-12.otf");
        }
        * {
            margin: 0;
            padding: 0;
        }
        body {
            color: #4b4b4b;
            font-family: Ark-Pixel, sans-serif;
            font-size: 48px;
            line-height: 48px;
            word-break: break-all;
            background-image: linear-gradient(90deg, rgba(255, 0, 0, 0.1) 4%, rgba(0, 0, 0, 0) 4%, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 255, 0.1) 50%, rgba(0, 0, 255, 0.1) 54%, rgba(0, 0, 0, 0) 54%), linear-gradient(180deg, rgba(255, 0, 0, 0.1) 4%, rgba(0, 0, 0, 0) 4%);
            background-size: 48px 48px;
        }
    </style>
</head>
<body>
ABCDEFGHIJKLMNOPQRSTUVWXYZ
<br>
abcdefghijklmnopqrstuvwxyz
<br>
0123456789
<br>
!"#$%&'()*+,-./:;<=>?@[\]^_`{|}~
<br>
丕丘个中乐习人介代休但国宅山工
</body>
</html>
