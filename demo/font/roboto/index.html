<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roboto Demo</title>
    <style>

        @font-face {
            font-family: Roboto;
            src: url("Roboto-Regular.ttf");
        }

        * {
            margin: 0;
            padding: 0;
        }

        .text {
            font-family: Roboto,serif;
            font-size: 40px;
            /*line-height: 100px;*/
            position: absolute;
            top: 0;
            left: 0;
        }

        .text-bg {
            height: 40px;
            width: 1000px;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #00FF00;
        }

        .text-bg2 {
            height: 80px;
            width: 1000px;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #FFFF00;
        }

    </style>
</head>
<body>

<div class="text-bg2"></div>
<div class="text-bg"></div>
<div class="text">
    Use `left`, `right`, `up` and `down` button to change text layout gravity.<br>And input something here..你好
</div>


</body>
</html>
