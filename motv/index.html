<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
    <meta name="format-detection" content="telephone=no">
    <title>闪播TV</title>
    <link type="text/css" rel="stylesheet" href="css/index.css">
</head>
<body>
<div>
    <div class="view-alert">
        <div class="alert-content">点击右上角按钮，然后在弹出的菜单中，点击在浏览器中打开，即可安装</div>
        <img class="arrow" src="img/alert-arrow.png"/>
    </div>
    <div class="container">
        <div class="content">
            <img class="logo" src="img/logo.png"/>
            <div class="pcEr">
                <p><img src="img/download-qrcode.png" alt=""></p>
                <p>请用手机扫描上方二维码下载安装</p>
            </div>
            <div class="downBtn">
                <span onclick="return false">下载闪播TV</span>
            </div>
            <div class="textBor">
                <h4>了解闪播TV</h4>
                <i class="bar"></i>
                <div class="text">
                    闪播TV是一款完美支持电视、手机、平板上的一款影视搜索点播软件。在这里你可以找到你想要看到的任何影视！不论是院线热映的电影，还是一些仅仅支持VIP会员播放的综艺、电视剧，你都能够在这里找到并且免费观看，软件不需要登录，直接下载即可使用。
                </div>
            </div>
        </div>
    </div>
</div>
<script src="js/jquery-3.1.1.min.js"></script>
<script>

    function isIos() {
        var agent = navigator.userAgent;
        var isiOS = !!agent.match(/iPhone|iPod|iPad|ios/i);
        return isiOS
    }

    function isPc() {
        var plat = navigator.platform;
        var win = plat.indexOf("Win") == 0;
        var mac = plat.indexOf("Mac") == 0;
        if (!this.isIos() && (win || mac)) {
            return true
        } else {
            return false
        }
    }

    function isWeiXin() {
        var ua = window.navigator.userAgent.toLowerCase();
        if (ua.match(/MicroMessenger/i) == 'micromessenger') {
            return true;
        } else {
            return false;
        }
    }

    $('.downBtn').on('click', function () {
        if (isPc()) {
            alert('请在手机上使用浏览器打开本页面，或者扫描本页面二维码即可安装。');
            return
        } else if (isWeiXin()) {
            $('.view-alert').show();
            return
        }

        window.location.href = "https://videofilm.lanzous.com/b01bn4bxe"
    })

    if (isPc()) {
        $('body').css('margin', '0 auto').css('width', '375px');
        $('.content').css('width', '375px');
    }

</script>
</body>
</html>
